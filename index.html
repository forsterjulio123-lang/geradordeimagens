<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Gerador de Artes D&D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://js.puter.com/v2/"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Text',serif;background:#12101c;color:#e0d8c8;min-height:100vh;padding:1rem 1rem 3rem}
h1{font-family:'Cinzel',serif;text-align:center;color:#d4a830;font-size:clamp(1.3rem,4vw,1.9rem);margin:1rem 0 .3rem;text-shadow:0 0 20px rgba(212,168,48,.3)}
.sub{text-align:center;color:#908070;font-size:.88rem;margin-bottom:1.2rem}
.sec{font-family:'Cinzel',serif;font-size:.78rem;color:#d4a830;margin:1rem 0 .4rem;text-transform:uppercase;letter-spacing:.06em;text-align:center}
.tags{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:.6rem}
.tag{padding:.3rem .65rem;font-family:'Cinzel',serif;font-size:.64rem;border:1.5px solid #3a3050;border-radius:20px;background:#1e1a2e;color:#908070;cursor:pointer;transition:all .25s;user-select:none}
.tag:hover{border-color:#d4a830;color:#e0d8c8}
.tag.on{border-color:#d4a830;background:rgba(212,168,48,.15);color:#d4a830}
.styles{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.4rem;max-width:550px;margin:0 auto .6rem}
.sty{padding:.4rem;text-align:center;border:2px solid #3a3050;border-radius:6px;background:#1e1a2e;cursor:pointer;transition:all .3s}
.sty:hover{border-color:#d4a830}
.sty.on{border-color:#d4a830;box-shadow:0 0 10px rgba(212,168,48,.3);background:rgba(212,168,48,.1)}
.sty .si{font-size:1.2rem;display:block}
.sty .sn{font-family:'Cinzel',serif;font-size:.55rem;color:#d4a830}
.ctrls{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin:1rem 0}
.btn{padding:.5rem 1.1rem;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;border:2px solid #3a3050;border-radius:6px;background:#1e1a2e;color:#e0d8c8;cursor:pointer;transition:all .3s}
.btn:hover{border-color:#d4a830}
.btn.go{background:linear-gradient(135deg,#d4a830,#a88420);color:#111;border-color:#d4a830}
.btn.stop{border-color:#c04040;color:#c04040;display:none}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-top:1rem}
.card{background:#1e1a2e;border:2px solid #3a3050;border-radius:8px;overflow:hidden;transition:all .3s}
.card:hover{border-color:#d4a830;box-shadow:0 0 15px rgba(212,168,48,.3);transform:translateY(-2px)}
.card.now{border-color:#d4a830;box-shadow:0 0 20px rgba(212,168,48,.5)}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#0a0812}
.card .ph{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:#0a0812;font-size:1.3rem;color:#3a3050;flex-direction:column;gap:.3rem}
.card .ph small{font-size:.65rem;color:#4a3860}
.card .info{padding:.35rem .5rem;font-family:'Cinzel',serif;font-size:.6rem;color:#d4a830;text-align:center}
.card .acts{display:flex;gap:.3rem;padding:0 .5rem .4rem;justify-content:center}
.card .acts button{padding:.2rem .6rem;font-size:.58rem;font-family:'Cinzel',serif;border:1px solid #3a3050;border-radius:4px;background:#12101c;color:#e0d8c8;cursor:pointer;transition:all .2s}
.card .acts button:hover{border-color:#d4a830;color:#d4a830}
.msg{text-align:center;color:#908070;font-size:.85rem;margin:1rem 0;font-style:italic}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulsing{animation:pulse 1.5s ease-in-out infinite}
@media(max-width:600px){.gallery{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
</style>
</head>
<body>
<h1>🎨 Gerador de Artes D&D</h1>
<p class="sub">Retratos com IA · Powered by Puter.js · 100% Gratuito</p>

<div class="sec">🎨 Estilo</div>
<div class="styles" id="stys"></div>
<div class="sec">👤 Gênero</div>
<div class="tags">
  <div class="tag on" onclick="pickGen('male',this)" data-g="male">♂️ Masculino</div>
  <div class="tag" onclick="pickGen('female',this)" data-g="female">♀️ Feminino</div>
  <div class="tag" onclick="pickGen('both',this)" data-g="both">⚔️ Ambos</div>
</div>
<div class="sec">🧬 Raças</div>
<div class="tags" id="racas"></div>
<div class="sec">⚔️ Classes</div>
<div class="tags" id="classes"></div>
<div class="ctrls">
  <button class="btn" onclick="allOn()">✅ Tudo</button>
  <button class="btn" onclick="allOff()">❌ Limpar</button>
  <button class="btn go" id="goBtn" onclick="gerar()">🚀 Gerar</button>
  <button class="btn stop" id="stopBtn" onclick="stopFlag=true">⏹ Parar</button>
</div>
<div id="status" class="msg"></div>
<div class="gallery" id="gallery"></div>

<script>
const R=[
  {id:'humano',n:'Humano',i:'🧑',v:'human, brown hair, fair skin'},
  {id:'elfo',n:'Elfo',i:'🧝',v:'elf, long pointed ears, golden hair, pale skin'},
  {id:'anao',n:'Anão',i:'⛏️',v:'dwarf, short stocky, thick braided beard'},
  {id:'halfling',n:'Halfling',i:'🍀',v:'halfling, very small, curly hair, rosy cheeks'},
  {id:'tiefling',n:'Tiefling',i:'😈',v:'tiefling, red-purple skin, curved horns, glowing yellow eyes, tail'},
  {id:'draconato',n:'Draconato',i:'🐉',v:'dragonborn, green scaled skin, dragon snout, no hair'},
  {id:'gnomo',n:'Gnomo',i:'🧙',v:'gnome, tiny, big curious eyes, wild spiky hair'},
  {id:'meio-elfo',n:'Meio-Elfo',i:'🌿',v:'half-elf, slightly pointed ears, graceful'},
  {id:'meio-orc',n:'Meio-Orc',i:'💪',v:'half-orc, green skin, small tusks, muscular, scarred'},
  {id:'orc',n:'Orc',i:'🪓',v:'orc, deep green skin, large tusks, tribal war paint'},
  {id:'aasimar',n:'Aasimar',i:'👼',v:'aasimar, celestial, glowing golden eyes, subtle halo'},
  {id:'goliath',n:'Goliath',i:'🏔️',v:'goliath, towering, gray skin, bald, tribal tattoos'},
];
const C=[
  {id:'barbaro',n:'Bárbaro',i:'🪓',v:'barbarian warrior, fur armor, great axe, wild hair'},
  {id:'bardo',n:'Bardo',i:'🎵',v:'bard, elegant clothing, feathered hat, lute'},
  {id:'clerigo',n:'Clérigo',i:'✝️',v:'cleric, holy vestments, divine light, chain mail'},
  {id:'druida',n:'Druida',i:'🌿',v:'druid, leaf robes, wooden staff with vines'},
  {id:'guerreiro',n:'Guerreiro',i:'⚔️',v:'fighter, full plate armor, sword and shield'},
  {id:'monge',n:'Monge',i:'👊',v:'monk, simple robes, martial arts stance, ki energy'},
  {id:'paladino',n:'Paladino',i:'🛡️',v:'paladin, shining plate armor, holy sword, golden aura'},
  {id:'ranger',n:'Ranger',i:'🏹',v:'ranger, green leather armor, hooded cloak, longbow'},
  {id:'ladino',n:'Ladino',i:'🗡️',v:'rogue, dark leather armor, dual daggers, hooded'},
  {id:'feiticeiro',n:'Feiticeiro',i:'✨',v:'sorcerer, arcane energy from hands, enchanted robes'},
  {id:'bruxo',n:'Bruxo',i:'🔮',v:'warlock, dark robes, eldritch green energy, grimoire'},
  {id:'mago',n:'Mago',i:'📖',v:'wizard, ornate robes, pointed hat, spellbook, glowing staff'},
];
const ST=[
  {id:'fantasy',n:'Fantasia',i:'🖼️',p:'epic fantasy oil painting, dramatic lighting, rich colors'},
  {id:'medieval',n:'Medieval',i:'👑',p:'Renaissance portrait painting, classical, Rembrandt lighting'},
  {id:'dark',n:'Dark Fantasy',i:'🌑',p:'dark fantasy art, gritty, atmospheric, moody lighting'},
  {id:'anime',n:'Anime',i:'⭐',p:'anime art style, cel-shading, vibrant colors, expressive eyes'},
  {id:'watercolor',n:'Aquarela',i:'💧',p:'watercolor painting, soft blending, delicate, dreamy'},
  {id:'comic',n:'Comic',i:'💥',p:'comic book art, bold outlines, dynamic shading, heroic'},
  {id:'pixel',n:'Pixel Art',i:'👾',p:'pixel art, 32-bit RPG character, retro game style'},
  {id:'real',n:'Realista',i:'📷',p:'photorealistic, cinematic lighting, hyper-detailed, 8K'},
];

let sr=new Set(['humano']),sc=new Set(['guerreiro']),ss='fantasy',sg='male',stopFlag=false,running=false;

function init(){
  document.getElementById('stys').innerHTML=ST.map(s=>`<div class="sty ${s.id===ss?'on':''}" onclick="pickSty('${s.id}',this)"><span class="si">${s.i}</span><span class="sn">${s.n}</span></div>`).join('');
  document.getElementById('racas').innerHTML=R.map(r=>`<div class="tag ${sr.has(r.id)?'on':''}" onclick="tog(this,'${r.id}','r')">${r.i} ${r.n}</div>`).join('');
  document.getElementById('classes').innerHTML=C.map(c=>`<div class="tag ${sc.has(c.id)?'on':''}" onclick="tog(this,'${c.id}','c')">${c.i} ${c.n}</div>`).join('');
  updBtn();
}
function pickSty(id,el){ss=id;document.querySelectorAll('.sty').forEach(e=>e.classList.remove('on'));el.classList.add('on')}
function pickGen(id,el){sg=id;document.querySelectorAll('[data-g]').forEach(e=>e.classList.remove('on'));el.classList.add('on');updBtn()}
function tog(el,id,t){const s=t==='r'?sr:sc;s.has(id)?s.delete(id):s.add(id);el.classList.toggle('on');updBtn()}
function updBtn(){const m=sg==='both'?2:1;const t=sr.size*sc.size*m;document.getElementById('goBtn').textContent=`🚀 Gerar ${t} Arte${t!==1?'s':''}`}
function allOn(){sr=new Set(R.map(x=>x.id));sc=new Set(C.map(x=>x.id));init()}
function allOff(){sr.clear();sc.clear();init()}

function mkPrompt(race,cls,gen){
  const sty=ST.find(s=>s.id===ss);
  const g=gen==='female'?'female woman':'male man';
  return `Portrait of a ${g} ${race.v}, ${cls.v}. ${sty.p}. Dark atmospheric background, upper body bust portrait, highly detailed face. No text, no watermark.`;
}

async function generateImage(prompt){
  const imgEl = await puter.ai.txt2img(prompt, {model:'dall-e-3'});
  return imgEl.src;
}

async function gerar(){
  if(!sr.size||!sc.size){alert('Selecione raça e classe');return}
  if(running)return;
  running=true;stopFlag=false;
  document.getElementById('goBtn').style.display='none';
  document.getElementById('stopBtn').style.display='inline-block';

  const gal=document.getElementById('gallery');gal.innerHTML='';
  const gs=sg==='both'?['male','female']:[sg];
  const sym={male:'♂',female:'♀'},nm={male:'Masc.',female:'Fem.'};

  const jobs=[];
  for(const gen of gs)for(const rid of sr)for(const cid of sc)
    jobs.push({rid,cid,gen,r:R.find(x=>x.id===rid),c:C.find(x=>x.id===cid)});

  // Create placeholders
  for(const j of jobs){
    const k=`${j.rid}_${j.cid}_${j.gen}`;
    const d=document.createElement('div');d.className='card';d.id='c_'+k;
    d.innerHTML=`<div class="ph" id="ph_${k}">⏳<small>Na fila</small></div>
      <div class="info">${j.r.i} ${j.r.n} · ${j.c.i} ${j.c.n} · ${sym[j.gen]} ${nm[j.gen]}</div>
      <div class="acts"><button onclick="redo('${j.rid}','${j.cid}','${j.gen}')">🔄 Refazer</button></div>`;
    gal.appendChild(d);
  }

  let done=0,ok=0,er=0;
  for(const j of jobs){
    if(stopFlag)break;
    const k=`${j.rid}_${j.cid}_${j.gen}`;
    const card=document.getElementById('c_'+k);card.classList.add('now');
    const ph=document.getElementById('ph_'+k);
    ph.innerHTML='<span class="spin">🎨</span><small>Gerando...</small>';ph.classList.add('pulsing');
    document.getElementById('status').innerHTML=`<span class="spin">🎨</span> Gerando ${done+1}/${jobs.length}: ${j.r.n} ${j.c.n} ${sym[j.gen]}...`;

    try{
      const prompt=mkPrompt(j.r,j.c,j.gen);
      const src=await generateImage(prompt);
      const img=document.createElement('img');img.src=src;
      ph.replaceWith(img);
      ok++;
    }catch(e){
      console.error(e);
      ph.classList.remove('pulsing');ph.innerHTML='❌<small>'+e.message?.slice(0,40)+'</small>';ph.style.color='#c04040';
      er++;
    }
    card.classList.remove('now');done++;
    if(!stopFlag&&done<jobs.length)await new Promise(r=>setTimeout(r,1000));
  }

  running=false;
  document.getElementById('goBtn').style.display='inline-block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('status').innerHTML=stopFlag?`⏹ Parado. ${ok}✅ ${er}❌`:`✅ Pronto! ${ok} geradas${er?', '+er+' erros':''}`;
}

async function redo(rid,cid,gen){
  const k=`${rid}_${cid}_${gen}`;
  const r=R.find(x=>x.id===rid),c=C.find(x=>x.id===cid);
  const card=document.getElementById('c_'+k);
  const old=card.querySelector('img')||card.querySelector('.ph');
  const ph=document.createElement('div');ph.className='ph pulsing';ph.innerHTML='<span class="spin">🎨</span><small>Gerando...</small>';
  old.replaceWith(ph);
  try{
    const src=await generateImage(mkPrompt(r,c,gen));
    const img=document.createElement('img');img.src=src;ph.replaceWith(img);
  }catch(e){ph.classList.remove('pulsing');ph.innerHTML='❌';ph.style.color='#c04040'}
}

init();
</script>
</body>
</html>
