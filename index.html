<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 Teste de APIs de Imagem</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#12101c;color:#e0d8c8;padding:1.5rem;min-height:100vh}
h1{text-align:center;color:#d4a830;margin-bottom:1rem}
p{text-align:center;color:#908070;margin-bottom:2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
.test{background:#1e1a2e;border:2px solid #3a3050;border-radius:8px;padding:1rem;text-align:center}
.test h3{color:#d4a830;font-size:.9rem;margin-bottom:.3rem}
.test .api{color:#908070;font-size:.75rem;margin-bottom:.8rem;word-break:break-all}
.test img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:4px;background:#0a0812;display:block}
.test .status{margin-top:.5rem;padding:.3rem;border-radius:4px;font-size:.8rem;font-weight:700}
.ok{background:#1a3a18;color:#50a838}
.fail{background:#3a1818;color:#c04040}
.loading{background:#2a2818;color:#d4a830}
.url-box{margin-top:.5rem;font-size:.6rem;color:#605848;word-break:break-all;max-height:60px;overflow:auto}
</style>
</head>
<body>
<h1>🔍 Teste de APIs de Imagem Gratuitas</h1>
<p>Aguarde ~20s para cada teste carregar. Veja qual funciona no seu navegador.</p>
<div class="grid" id="grid"></div>

<script>
const prompt = "Portrait of a male elf warrior, fantasy oil painting, dramatic lighting, dark background";
const encoded = encodeURIComponent(prompt);

const tests = [
  {
    name: "Pollinations (Flux) — v1",
    url: `https://image.pollinations.ai/prompt/${encoded}?width=512&height=680&seed=42&nologo=true&model=flux`,
  },
  {
    name: "Pollinations (Flux) — v2 sem model",
    url: `https://image.pollinations.ai/prompt/${encoded}?width=512&height=680&seed=42&nologo=true`,
  },
  {
    name: "Pollinations (Turbo)",
    url: `https://image.pollinations.ai/prompt/${encoded}?width=512&height=680&seed=42&nologo=true&model=turbo`,
  },
  {
    name: "Pollinations — prompt curto",
    url: `https://image.pollinations.ai/prompt/elf%20warrior%20fantasy%20portrait%20oil%20painting?width=512&height=680&seed=42&nologo=true`,
  },
  {
    name: "Picsum (teste de conectividade)",
    url: `https://picsum.photos/512/680?random=1`,
  },
];

const grid = document.getElementById('grid');

tests.forEach((t, i) => {
  const div = document.createElement('div');
  div.className = 'test';
  div.innerHTML = `
    <h3>${t.name}</h3>
    <div class="status loading" id="s${i}">⏳ Carregando...</div>
    <img id="img${i}" alt="teste"
      src="${t.url}"
      onload="document.getElementById('s${i}').className='status ok';document.getElementById('s${i}').textContent='✅ FUNCIONOU!'"
      onerror="document.getElementById('s${i}').className='status fail';document.getElementById('s${i}').textContent='❌ FALHOU'"
    >
    <div class="url-box">${t.url}</div>
  `;
  grid.appendChild(div);
});

// Timeout check after 45s
setTimeout(() => {
  tests.forEach((_, i) => {
    const s = document.getElementById('s' + i);
    if (s.classList.contains('loading')) {
      s.className = 'status fail';
      s.textContent = '⏰ TIMEOUT (45s)';
    }
  });
}, 45000);
</script>
</body>
</html>
