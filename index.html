<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Gerador de Artes D&D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Text',serif;background:#12101c;color:#e0d8c8;min-height:100vh;padding:1rem 1rem 3rem}
h1{font-family:'Cinzel',serif;text-align:center;color:#d4a830;font-size:clamp(1.3rem,4vw,1.9rem);margin:1rem 0 .3rem;text-shadow:0 0 20px rgba(212,168,48,.3)}
.sub{text-align:center;color:#908070;font-size:.9rem;margin-bottom:.3rem}
.badge{text-align:center;margin-bottom:1.2rem}
.badge span{display:inline-block;padding:.3rem 1rem;border-radius:20px;background:linear-gradient(135deg,#50a838,#2a8018);color:#fff;font-family:'Cinzel',serif;font-size:.65rem;font-weight:700}
.sec{font-family:'Cinzel',serif;font-size:.8rem;color:#d4a830;margin:1rem 0 .4rem;text-transform:uppercase;letter-spacing:.06em;text-align:center}
.tags{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:.6rem}
.tag{padding:.3rem .65rem;font-family:'Cinzel',serif;font-size:.64rem;border:1.5px solid #3a3050;border-radius:20px;background:#1e1a2e;color:#908070;cursor:pointer;transition:all .25s;user-select:none}
.tag:hover{border-color:#d4a830;color:#e0d8c8}
.tag.on{border-color:#d4a830;background:rgba(212,168,48,.15);color:#d4a830}
.styles{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.4rem;max-width:550px;margin:0 auto .6rem}
.sty{padding:.4rem;text-align:center;border:2px solid #3a3050;border-radius:6px;background:#1e1a2e;cursor:pointer;transition:all .3s}
.sty:hover{border-color:#d4a830}
.sty.on{border-color:#d4a830;box-shadow:0 0 10px rgba(212,168,48,.3);background:rgba(212,168,48,.1)}
.sty .si{font-size:1.2rem;display:block}
.sty .sn{font-family:'Cinzel',serif;font-size:.55rem;color:#d4a830}
.ctrls{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin:1rem 0}
.btn{padding:.5rem 1.1rem;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;border:2px solid #3a3050;border-radius:6px;background:#1e1a2e;color:#e0d8c8;cursor:pointer;transition:all .3s}
.btn:hover{border-color:#d4a830}
.btn.go{background:linear-gradient(135deg,#d4a830,#a88420);color:#111;border-color:#d4a830}
.btn.go:hover{box-shadow:0 0 20px rgba(212,168,48,.4)}
.btn.stop{border-color:#c04040;color:#c04040;display:none}
.btn.stop:hover{background:#c04040;color:#fff}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-top:1rem}
.card{background:#1e1a2e;border:2px solid #3a3050;border-radius:8px;overflow:hidden;transition:all .3s}
.card:hover{border-color:#d4a830;box-shadow:0 0 15px rgba(212,168,48,.3);transform:translateY(-2px)}
.card.active{border-color:#d4a830;box-shadow:0 0 15px rgba(212,168,48,.4)}
.card img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#0a0812}
.card .placeholder{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;background:#0a0812;font-size:1.5rem;color:#3a3050}
.card .info{padding:.35rem .5rem;font-family:'Cinzel',serif;font-size:.6rem;color:#d4a830;text-align:center}
.card .acts{display:flex;gap:.3rem;padding:0 .5rem .4rem;justify-content:center}
.card .acts a,.card .acts button{padding:.2rem .5rem;font-size:.58rem;font-family:'Cinzel',serif;border:1px solid #3a3050;border-radius:4px;background:#12101c;color:#e0d8c8;cursor:pointer;transition:all .2s;text-decoration:none}
.card .acts a:hover,.card .acts button:hover{border-color:#d4a830;color:#d4a830}
.msg{text-align:center;color:#908070;font-size:.85rem;margin:1rem 0;font-style:italic}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulsing{animation:pulse 1.5s ease-in-out infinite}
@media(max-width:600px){.gallery{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
</style>
</head>
<body>

<h1>🎨 Gerador de Artes D&D</h1>
<p class="sub">Retratos com IA — para a Forja de Heróis</p>
<div class="badge"><span>✅ GRATUITO — SEM API KEY — SEM LIMITES</span></div>

<div class="sec">🎨 Estilo</div>
<div class="styles" id="stys"></div>

<div class="sec">👤 Gênero</div>
<div class="tags" id="genTags">
  <div class="tag on" onclick="pickGen('male',this)" data-g="male">♂️ Masculino</div>
  <div class="tag" onclick="pickGen('female',this)" data-g="female">♀️ Feminino</div>
  <div class="tag" onclick="pickGen('both',this)" data-g="both">⚔️ Ambos</div>
</div>

<div class="sec">🧬 Raças</div>
<div class="tags" id="racas"></div>

<div class="sec">⚔️ Classes</div>
<div class="tags" id="classes"></div>

<div class="ctrls">
  <button class="btn" onclick="allOn()">✅ Tudo</button>
  <button class="btn" onclick="allOff()">❌ Limpar</button>
  <button class="btn go" id="goBtn" onclick="gerar()">🚀 Gerar</button>
  <button class="btn stop" id="stopBtn" onclick="parar()">⏹ Parar</button>
</div>

<div id="status" class="msg"></div>
<div class="gallery" id="gallery"></div>

<script>
const R=[
  {id:'humano',n:'Humano',i:'🧑',v:'human brown hair'},
  {id:'elfo',n:'Elfo',i:'🧝',v:'elf pointed ears golden hair pale skin'},
  {id:'anao',n:'Anão',i:'⛏️',v:'dwarf stocky braided beard'},
  {id:'halfling',n:'Halfling',i:'🍀',v:'halfling small curly hair rosy cheeks'},
  {id:'tiefling',n:'Tiefling',i:'😈',v:'tiefling red skin curved horns glowing eyes tail'},
  {id:'draconato',n:'Draconato',i:'🐉',v:'dragonborn scaled skin dragon snout no hair'},
  {id:'gnomo',n:'Gnomo',i:'🧙',v:'gnome tiny big eyes wild hair big nose'},
  {id:'meio-elfo',n:'Meio-Elfo',i:'🌿',v:'half-elf slightly pointed ears graceful'},
  {id:'meio-orc',n:'Meio-Orc',i:'💪',v:'half-orc green skin tusks muscular scarred'},
  {id:'orc',n:'Orc',i:'🪓',v:'orc green skin large tusks war paint fierce'},
  {id:'aasimar',n:'Aasimar',i:'👼',v:'aasimar celestial glowing golden eyes halo'},
  {id:'goliath',n:'Goliath',i:'🏔️',v:'goliath towering gray skin bald tribal tattoos'},
];
const C=[
  {id:'barbaro',n:'Bárbaro',i:'🪓',v:'barbarian fur armor great axe'},
  {id:'bardo',n:'Bardo',i:'🎵',v:'bard elegant clothing lute feathered hat'},
  {id:'clerigo',n:'Clérigo',i:'✝️',v:'cleric holy vestments divine light chain mail'},
  {id:'druida',n:'Druida',i:'🌿',v:'druid leaf robes wooden staff vines'},
  {id:'guerreiro',n:'Guerreiro',i:'⚔️',v:'fighter plate armor sword shield'},
  {id:'monge',n:'Monge',i:'👊',v:'monk robes martial arts stance ki energy'},
  {id:'paladino',n:'Paladino',i:'🛡️',v:'paladin shining armor holy sword golden aura'},
  {id:'ranger',n:'Ranger',i:'🏹',v:'ranger leather armor hooded cloak longbow'},
  {id:'ladino',n:'Ladino',i:'🗡️',v:'rogue dark leather daggers hood shadows'},
  {id:'feiticeiro',n:'Feiticeiro',i:'✨',v:'sorcerer arcane energy robes magic runes'},
  {id:'bruxo',n:'Bruxo',i:'🔮',v:'warlock dark robes eldritch energy grimoire'},
  {id:'mago',n:'Mago',i:'📖',v:'wizard robes pointed hat spellbook staff crystal orb'},
];
const ST=[
  {id:'fantasy',n:'Fantasia',i:'🖼️',p:'fantasy oil painting dramatic lighting'},
  {id:'medieval',n:'Medieval',i:'👑',p:'Renaissance portrait oil painting classical'},
  {id:'dark',n:'Dark Fantasy',i:'🌑',p:'dark fantasy gritty atmospheric lighting'},
  {id:'anime',n:'Anime',i:'⭐',p:'anime art style cel-shading vibrant colors'},
  {id:'watercolor',n:'Aquarela',i:'💧',p:'watercolor painting soft blending dreamy'},
  {id:'comic',n:'Comic',i:'💥',p:'comic book bold outlines dynamic shading'},
  {id:'pixel',n:'Pixel Art',i:'👾',p:'pixel art 32-bit RPG retro game'},
  {id:'real',n:'Realista',i:'📷',p:'photorealistic cinematic lighting detailed'},
];

let sr=new Set(['humano']), sc=new Set(['guerreiro']), ss='fantasy', sg='male';
let running=false, stopFlag=false;

function init(){
  document.getElementById('stys').innerHTML=ST.map(s=>`<div class="sty ${s.id===ss?'on':''}" onclick="pickSty('${s.id}',this)"><span class="si">${s.i}</span><span class="sn">${s.n}</span></div>`).join('');
  document.getElementById('racas').innerHTML=R.map(r=>`<div class="tag ${sr.has(r.id)?'on':''}" onclick="tog(this,'${r.id}','r')">${r.i} ${r.n}</div>`).join('');
  document.getElementById('classes').innerHTML=C.map(c=>`<div class="tag ${sc.has(c.id)?'on':''}" onclick="tog(this,'${c.id}','c')">${c.i} ${c.n}</div>`).join('');
  updBtn();
}
function pickSty(id,el){ss=id;document.querySelectorAll('.sty').forEach(e=>e.classList.remove('on'));el.classList.add('on')}
function pickGen(id,el){sg=id;document.querySelectorAll('[data-g]').forEach(e=>e.classList.remove('on'));el.classList.add('on');updBtn()}
function tog(el,id,t){const s=t==='r'?sr:sc;s.has(id)?s.delete(id):s.add(id);el.classList.toggle('on');updBtn()}
function updBtn(){const m=sg==='both'?2:1;const t=sr.size*sc.size*m;document.getElementById('goBtn').textContent=`🚀 Gerar ${t} Arte${t!==1?'s':''}`}
function allOn(){sr=new Set(R.map(x=>x.id));sc=new Set(C.map(x=>x.id));init()}
function allOff(){sr.clear();sc.clear();init()}

function mkPrompt(race,cls,gen){
  const sty=ST.find(s=>s.id===ss);
  const g=gen==='female'?'female':'male';
  return `${g} ${race.v} ${cls.v}, ${sty.p}, dark background, portrait bust, detailed face`;
}
function mkUrl(prompt,seed){
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=768&height=1024&seed=${seed}&nologo=true`;
}

// Load image with retry
function loadImage(url, maxRetries=2){
  return new Promise((resolve,reject)=>{
    let attempts=0;
    function tryLoad(){
      attempts++;
      const img=new Image();
      img.crossOrigin='anonymous';
      const timer=setTimeout(()=>{
        img.src='';
        if(attempts<=maxRetries){
          tryLoad();
        } else {
          reject(new Error('timeout'));
        }
      }, 30000); // 30s timeout per attempt
      img.onload=()=>{clearTimeout(timer);resolve(url)};
      img.onerror=()=>{
        clearTimeout(timer);
        if(attempts<=maxRetries){
          setTimeout(tryLoad, 2000);
        } else {
          reject(new Error('failed'));
        }
      };
      img.src=url;
    }
    tryLoad();
  });
}

async function gerar(){
  if(sr.size===0||sc.size===0){alert('Selecione ao menos 1 raça e 1 classe');return}
  if(running)return;
  running=true;stopFlag=false;
  document.getElementById('goBtn').style.display='none';
  document.getElementById('stopBtn').style.display='inline-block';

  const gal=document.getElementById('gallery');
  gal.innerHTML='';
  const genders=sg==='both'?['male','female']:[sg];
  const gSym={male:'♂',female:'♀'};
  const gNome={male:'Masc.',female:'Fem.'};

  // Build job list
  const jobs=[];
  for(const gen of genders)
    for(const rid of sr)
      for(const cid of sc)
        jobs.push({rid,cid,gen,race:R.find(x=>x.id===rid),cls:C.find(x=>x.id===cid)});

  // Create placeholder cards
  for(const j of jobs){
    const key=`${j.rid}_${j.cid}_${j.gen}`;
    const div=document.createElement('div');
    div.className='card';
    div.id='c_'+key;
    div.innerHTML=`
      <div class="placeholder" id="ph_${key}">⏳</div>
      <div class="info">${j.race.i} ${j.race.n} · ${j.cls.i} ${j.cls.n} · ${gSym[j.gen]} ${gNome[j.gen]}</div>
      <div class="acts">
        <a id="dl_${key}" href="#" target="_blank">💾 Salvar</a>
        <button onclick="redo('${key}','${j.rid}','${j.cid}','${j.gen}')">🔄 Refazer</button>
      </div>`;
    gal.appendChild(div);
  }

  const total=jobs.length;
  let done=0, ok=0, errs=0;

  // Process ONE AT A TIME
  for(const j of jobs){
    if(stopFlag)break;
    const key=`${j.rid}_${j.cid}_${j.gen}`;
    const card=document.getElementById('c_'+key);
    card.classList.add('active');
    const ph=document.getElementById('ph_'+key);
    ph.innerHTML='<span class="spin">🎨</span>';
    ph.classList.add('pulsing');

    document.getElementById('status').innerHTML=`<span class="spin">🎨</span> Gerando ${done+1}/${total}: ${j.race.n} ${j.cls.n} ${gSym[j.gen]}...`;

    const seed=Math.floor(Math.random()*999999);
    const prompt=mkPrompt(j.race,j.cls,j.gen);
    const url=mkUrl(prompt,seed);

    try{
      await loadImage(url);
      // Success - replace placeholder with image
      const img=document.createElement('img');
      img.src=url;
      img.alt=`${j.race.n} ${j.cls.n}`;
      ph.replaceWith(img);
      document.getElementById('dl_'+key).href=url;
      ok++;
    }catch(e){
      ph.classList.remove('pulsing');
      ph.innerHTML='❌';
      ph.style.color='#c04040';
      errs++;
    }
    card.classList.remove('active');
    done++;

    // Small pause between images to not overwhelm the API
    if(!stopFlag && done<total) await new Promise(r=>setTimeout(r,1500));
  }

  running=false;
  document.getElementById('goBtn').style.display='inline-block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('status').innerHTML=stopFlag
    ?`⏹ Parado. ${ok} geradas, ${errs} erros.`
    :`✅ Concluído! ${ok} geradas${errs>0?', '+errs+' erros':''}`;
}

function parar(){stopFlag=true}

async function redo(key,rid,cid,gen){
  const race=R.find(x=>x.id===rid), cls=C.find(x=>x.id===cid);
  const seed=Math.floor(Math.random()*999999);
  const prompt=mkPrompt(race,cls,gen);
  const url=mkUrl(prompt,seed);
  const card=document.getElementById('c_'+key);
  const existing=card.querySelector('img')||card.querySelector('.placeholder');

  // Show loading
  const ph=document.createElement('div');
  ph.className='placeholder pulsing';
  ph.innerHTML='<span class="spin">🎨</span>';
  existing.replaceWith(ph);

  try{
    await loadImage(url);
    const img=document.createElement('img');
    img.src=url;
    ph.replaceWith(img);
    document.getElementById('dl_'+key).href=url;
  }catch(e){
    ph.classList.remove('pulsing');
    ph.innerHTML='❌';
    ph.style.color='#c04040';
  }
}

init();
</script>
</body>
</html>
